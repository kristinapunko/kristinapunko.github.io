<!doctype html>
<html>
    <head>
        <meta charset = 'utf-8'>
        <title>Wherever you go, there you are</title>
    </head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map {
            height: 500px; 
            width: 100%;  
        }
    </style>
<body>
    <form>
        <input type="button" id="watch" value="Watch me">
        <input type="button" id="clearWatch" value="Clear Watch">
    </form>
    <div id="location">
        Your location will go here.
    </div>
    <div id="distance">
        Distance from College will go here.
    </div>
    <div id="distanceToVerhovnaRada">
        Distance from VerhovnaRada will go here.
    </div>
    <div id="map"></div>
    <div>
        <h3>Enter the coordinates of the destination:</h3>
        <label for="destLatitude">Latitude:</label>
        <input type="number" id="destLatitude" step="0.000001"><br>
        <label for="destLongitude">Longitude:</label>
        <input type="number" id="destLongitude" step="0.000001"><br>
        <button id="addMarker">Add marker</button>
        <button id="scrollToDestination">Skroll to destination</button> 
    </div>
    <div id="map" style="height: 400px;"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src ="myLoc.js"></script>
</body>
</html>
